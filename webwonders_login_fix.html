<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0f14;--sur:#161920;--sur2:#1e2230;--bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);--txt:#eef0f5;--mut:#7a8099;--acc:#6c63ff;--ac2:#00d4aa;--wrn:#f5a623;--dan:#ff5c5c;--suc:#4cd964;--fn:'DM Sans',sans-serif;--dp:'Syne',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;font-family:var(--fn);font-size:14px;color:var(--txt);background:var(--bg);}

/* LOGIN */
#login{display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;min-height:400px;background:var(--bg);}
.lcard{background:var(--sur);border:1px solid var(--bdr2);border-radius:18px;padding:28px 28px 24px;width:340px;text-align:center;}
.logo{font-family:var(--dp);font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sub{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;margin-top:2px;margin-bottom:20px;}
.ulabel{font-size:12px;color:var(--mut);margin-bottom:10px;}
.ulist{display:flex;flex-direction:column;gap:6px;}
.ubtn{width:100%;background:var(--sur2);border:1px solid var(--bdr2);border-radius:10px;padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;text-align:left;transition:border-color .15s,background .15s;color:var(--txt);}
.ubtn:hover{border-color:var(--acc);background:rgba(108,99,255,0.1);}
.uav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.uname{font-size:13px;font-weight:500;}
.urole{font-size:11px;color:var(--mut);margin-top:1px;}

/* PIN */
.plabel{font-size:13px;color:var(--mut);margin-bottom:14px;}
.pdots{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.pdot{width:13px;height:13px;border-radius:50%;border:2px solid var(--bdr2);transition:all .2s;}
.pdot.on{background:var(--acc);border-color:var(--acc);}
.pdot.err{background:var(--dan);border-color:var(--dan);}
.ppad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:220px;margin:0 auto;}
.pkey{background:var(--sur2);border:1px solid var(--bdr2);border-radius:9px;padding:12px;font-size:17px;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s;color:var(--txt);font-family:var(--dp);}
.pkey:hover{background:rgba(108,99,255,0.18);border-color:var(--acc);}
.pkey:active{transform:scale(.94);}
.perr{color:var(--dan);font-size:12px;margin-top:10px;min-height:16px;}
.back{font-size:12px;color:var(--mut);cursor:pointer;margin-top:12px;text-decoration:underline;display:inline-block;}
.back:hover{color:var(--txt);}

/* APP */
#app{display:none;width:100%;}
.layout{display:flex;min-height:600px;}
.side{width:200px;background:var(--sur);border-right:1px solid var(--bdr);flex-shrink:0;display:flex;flex-direction:column;}
.slogo{padding:18px 16px 14px;border-bottom:1px solid var(--bdr);}
.slogo-t{font-family:var(--dp);font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.slogo-s{font-size:10px;color:var(--mut);letter-spacing:.05em;text-transform:uppercase;margin-top:1px;}
.snav{padding:8px 0;flex:1;overflow-y:auto;}
.nsec{padding:6px 16px 2px;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;margin-top:6px;}
.ni{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:13px;color:var(--mut);transition:all .15s;border-left:2px solid transparent;}
.ni:hover{color:var(--txt);background:rgba(255,255,255,0.04);}
.ni.on{color:var(--acc);border-left-color:var(--acc);background:rgba(108,99,255,0.08);}
.nbadge{margin-left:auto;background:var(--dan);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;font-weight:600;}
.sfot{padding:12px 16px;border-top:1px solid var(--bdr);}
.sfrow{display:flex;align-items:center;gap:8px;}
.sfav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;}
.sfn{font-size:13px;font-weight:500;}
.sfr{font-size:11px;color:var(--mut);}
.sout{font-size:11px;color:var(--mut);cursor:pointer;margin-top:6px;text-decoration:underline;}
.sout:hover{color:var(--dan);}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.tbar{background:var(--sur);border-bottom:1px solid var(--bdr);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tbar-t{font-family:var(--dp);font-size:16px;font-weight:700;}
.tbar-a{display:flex;gap:8px;}
.pg{padding:20px 22px;flex:1;}

/* UI */
.btn{padding:6px 14px;border-radius:7px;border:none;cursor:pointer;font-family:var(--fn);font-size:12px;font-weight:500;transition:all .15s;}
.bp{background:var(--acc);color:#fff;}.bp:hover{background:#7b74ff;}
.bg{background:transparent;color:var(--mut);border:1px solid var(--bdr2);}.bg:hover{color:var(--txt);background:var(--sur2);}
.bs{padding:4px 10px;font-size:11px;}
.bd{background:rgba(255,92,92,0.15);color:var(--dan);border:1px solid rgba(255,92,92,0.3);}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.sc{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;}
.sl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;}
.sv{font-family:var(--dp);font-size:24px;font-weight:800;margin-top:4px;}
.ss{font-size:11px;color:var(--mut);margin-top:3px;}
.crd{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;}
.ch{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.ct{font-size:13px;font-weight:600;}
table{width:100%;border-collapse:collapse;}
th{padding:8px 12px;text-align:left;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--bdr);font-weight:500;}
td{padding:9px 12px;border-bottom:1px solid var(--bdr);font-size:12px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;}
.ba{background:rgba(76,217,100,0.15);color:var(--suc);}
.bw{background:rgba(245,166,35,0.15);color:var(--wrn);}
.bdd{background:rgba(255,92,92,0.15);color:var(--dan);}
.bi{background:rgba(108,99,255,0.15);color:var(--acc);}
.bm{background:var(--sur2);color:var(--mut);}
.chip{display:inline-flex;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:500;}
.cig{background:rgba(225,48,108,0.15);color:#e1306c;}
.cfb{background:rgba(24,119,242,0.15);color:#1877f2;}
.cli{background:rgba(10,102,194,0.15);color:#0a66c2;}
.rp{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.ra{background:rgba(108,99,255,0.2);color:var(--acc);}
.rm{background:rgba(0,212,170,0.15);color:var(--ac2);}
.rs{background:rgba(245,166,35,0.15);color:var(--wrn);}
.rv{background:rgba(122,128,153,0.2);color:var(--mut);}
.ti{padding:9px 12px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;}
.ti:last-child{border-bottom:none;}
.tck{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--bdr2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tck.dn{background:var(--suc);border-color:var(--suc);}
.ttx{flex:1;font-size:12px;}
.ttx.dn{text-decoration:line-through;color:var(--mut);}
.tcl{font-size:10px;color:var(--mut);}
.tpr{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600;}
.ph{background:rgba(255,92,92,0.15);color:var(--dan);}
.pm{background:rgba(245,166,35,0.15);color:var(--wrn);}
.pl{background:rgba(76,217,100,0.15);color:var(--suc);}
.pi{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;}
.pi:last-child{border-bottom:none;}
.pdt{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pig{background:#e1306c;}.pfb{background:#1877f2;}.pli{background:#0a66c2;}
.tcols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.es{text-align:center;padding:30px;color:var(--mut);}
.es .em{font-size:30px;margin-bottom:8px;}
.tabs{display:flex;gap:3px;padding:3px;background:var(--sur2);border-radius:9px;margin-bottom:16px;max-width:280px;}
.tab{padding:6px 14px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--mut);transition:all .15s;flex:1;text-align:center;}
.tab.on{background:var(--sur);color:var(--txt);font-weight:500;}
.srch{background:var(--sur2);border:1px solid var(--bdr2);border-radius:7px;padding:7px 12px;color:var(--txt);font-family:var(--fn);font-size:12px;outline:none;width:240px;}
.srch:focus{border-color:var(--acc);}
.alrt{border-radius:9px;padding:10px 14px;margin-bottom:10px;font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.aw{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.25);color:var(--wrn);}
.ad{background:rgba(255,92,92,0.1);border:1px solid rgba(255,92,92,0.25);color:var(--dan);}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:12px;}
.cdh{text-align:center;font-size:10px;color:var(--mut);padding:3px 0;}
.cday{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;position:relative;font-size:11px;}
.cday:hover{background:var(--sur2);}
.cday.cdt{background:rgba(108,99,255,0.15);color:var(--acc);font-weight:600;}
.cday.chp::after{content:'';width:4px;height:4px;background:var(--ac2);border-radius:50%;position:absolute;bottom:3px;}
.fi{background:var(--sur2);border:1px solid var(--bdr2);border-radius:7px;padding:8px 11px;color:var(--txt);font-family:var(--fn);font-size:12px;outline:none;width:100%;}
.fi:focus{border-color:var(--acc);}
select.fi option{background:var(--sur2);}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;font-weight:500;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fgf{grid-column:1/-1;}
.fa{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:center;justify-content:center;}
.mb{background:var(--sur);border:1px solid var(--bdr2);border-radius:14px;padding:24px;width:500px;max-width:95vw;max-height:88vh;overflow-y:auto;}
.mt{font-family:var(--dp);font-size:16px;font-weight:700;margin-bottom:16px;}
.itot{font-family:var(--dp);font-size:20px;font-weight:800;color:var(--suc);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px;}
</style>
</head>
<body>

<div id="login">
  <div class="lcard">
    <div class="logo">Web Wonders</div>
    <div class="sub">Agency HQ</div>
    <div id="sp-users">
      <div class="ulabel">Select your account</div>
      <div class="ulist" id="ulist"></div>
    </div>
    <div id="sp-pin" style="display:none">
      <div class="plabel" id="pgreet">Enter your PIN</div>
      <div class="pdots">
        <div class="pdot" id="d0"></div><div class="pdot" id="d1"></div>
        <div class="pdot" id="d2"></div><div class="pdot" id="d3"></div>
      </div>
      <div class="ppad" id="ppad"></div>
      <div class="perr" id="perr"></div>
      <span class="back" id="backbtn">← Different account</span>
    </div>
  </div>
</div>

<div id="app">
  <div class="layout">
    <div class="side">
      <div class="slogo"><div class="slogo-t">Web Wonders</div><div class="slogo-s">Agency HQ</div></div>
      <div class="snav" id="snav">
        <div class="nsec">Overview</div>
        <div class="ni on" data-p="dashboard"><span>📊</span><span>Dashboard</span></div>
        <div class="nsec">Work</div>
        <div class="ni" data-p="clients"><span>👥</span><span>Clients</span></div>
        <div class="ni" data-p="tasks"><span>✅</span><span>Tasks</span><span class="nbadge" id="tbadge" style="display:none">0</span></div>
        <div class="ni" data-p="scheduler"><span>📅</span><span>Scheduler</span></div>
        <div class="ni" data-p="renewals"><span>🔔</span><span>Renewals</span><span class="nbadge" id="rbadge" style="display:none;background:var(--wrn)">0</span></div>
        <div class="nsec">Finance</div>
        <div class="ni" data-p="invoices"><span>🧾</span><span>Invoices</span></div>
        <div class="nsec">Reports</div>
        <div class="ni" data-p="reports"><span>📈</span><span>Reports</span></div>
        <div class="nsec" id="nsec-admin">Admin</div>
        <div class="ni" data-p="users" id="ni-users"><span>🔐</span><span>Users</span></div>
        <div class="nsec">Account</div>
        <div class="ni" data-p="settings"><span>⚙️</span><span>Settings</span></div>
      </div>
      <div class="sfot">
        <div class="sfrow"><div class="sfav" id="sfav"></div><div><div class="sfn" id="sfn"></div><div class="sfr" id="sfr"></div></div></div>
        <div class="sout" id="sout">Log out</div>
      </div>
    </div>
    <div class="main">
      <div class="tbar"><div class="tbar-t" id="ptitle">Dashboard</div><div class="tbar-a" id="tactions"></div></div>
      <div class="pg" id="pgcontent"></div>
    </div>
  </div>
</div>

<div class="mo" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="mb" id="mbody"></div>
</div>

<script>
var D={users:[],clients:[],tasks:[],posts:[],invoices:[],reports:[],agencyName:'Web Wonders',ownerName:'',gstNumber:''};
var CU=null,PB='',SU=null,calM,calY,calSel,taskTab='pending',cSearch='';
var COLORS=['#6c63ff','#00d4aa','#f5a623','#ff5c5c','#4cd964','#1877f2','#e1306c','#ff9500'];
var pickedColor='#6c63ff';

function can(a){var r=CU?CU.role:'';if(a==='add'||a==='edit')return r==='admin'||r==='manager';if(a==='del')return r==='admin';if(a==='task')return r==='admin'||r==='manager'||r==='staff';if(a==='users')return r==='admin';return false;}
function load(){try{var s=localStorage.getItem('ww4');if(s){var p=JSON.parse(s);for(var k in p)D[k]=p[k];}}catch(e){}}
function save(){try{localStorage.setItem('ww4',JSON.stringify(D));}catch(e){}}
function uid(){return Math.random().toString(36).slice(2,9);}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function gc(id){return D.clients.find(function(c){return c.id===id;})||{name:'—'};}
function fd(d){if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function du(d){if(!d)return 999;return Math.ceil((new Date(d+'T00:00:00')-new Date())/86400000);}
function fm(n){return '\u20b9'+Number(n).toLocaleString('en-IN');}
function pchip(p){var c=p==='ig'?'cig':p==='fb'?'cfb':'cli',l=p==='ig'?'IG':p==='fb'?'FB':'LI';return '<span class="chip '+c+'">'+l+'</span>';}
function plbl(p){return p==='ig'?'Instagram':p==='fb'?'Facebook':'LinkedIn';}
function rpill(r){return '<span class="rp r'+r.charAt(0)+'">'+cap(r)+'</span>';}
function copts(sel){return D.clients.map(function(c){return'<option value="'+c.id+'"'+(sel===c.id?' selected':'')+'>'+c.name+'</option>';}).join('');}

function seed(){
  if(D.users.length)return;
  D.users=[{id:'u1',name:'Owner',username:'owner',pin:'1234',role:'admin',color:'#6c63ff',active:true},{id:'u2',name:'Manager',username:'manager',pin:'2222',role:'manager',color:'#00d4aa',active:true},{id:'u3',name:'Staff',username:'staff',pin:'3333',role:'staff',color:'#f5a623',active:true},{id:'u4',name:'Viewer',username:'viewer',pin:'4444',role:'viewer',color:'#7a8099',active:true}];
  var f=function(n){var d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];};
  var b=function(n){var d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0];};
  var td=new Date().toISOString().split('T')[0];
  D.clients=[{id:'c1',name:'Mehta Jewellers',contact:'Raj Mehta',email:'raj@mehtajewels.com',phone:'9876543210',platforms:['ig','fb'],domain:'mehtajewels.com',domainExp:f(12),emailExp:f(8),status:'active',notes:'Gold & diamond brand.'},{id:'c2',name:'TechTrend Solutions',contact:'Priya Shah',email:'priya@techtrend.in',phone:'9123456780',platforms:['li','fb'],domain:'techtrend.in',domainExp:f(45),emailExp:f(60),status:'active',notes:'B2B software.'},{id:'c3',name:'Spice Route Restaurant',contact:'Ahmed Khan',email:'ahmed@spiceroute.in',phone:'9988776655',platforms:['ig','fb'],domain:'spiceroute.in',domainExp:b(3),emailExp:f(30),status:'active',notes:'Daily posts on IG.'},{id:'c4',name:'FitLife Gym',contact:'Sneha Patel',email:'sneha@fitlife.in',phone:'9012345678',platforms:['ig','fb','li'],domain:'fitlife.in',domainExp:f(90),emailExp:f(5),status:'active',notes:'4 locations.'}];
  D.tasks=[{id:'t1',text:'Design 3 posts for Mehta Jewellers',client:'c1',priority:'high',done:false,due:td},{id:'t2',text:'Reply to Priya Shah email',client:'c2',priority:'med',done:false,due:td},{id:'t3',text:'Renew Spice Route domain ASAP',client:'c3',priority:'high',done:false,due:td},{id:'t4',text:'Upload content calendar FitLife',client:'c4',priority:'med',done:true,due:b(1)}];
  D.posts=[{id:'p1',client:'c1',platform:'ig',caption:'Celebrate love with our new diamond collection',date:f(1),time:'10:00',status:'scheduled'},{id:'p2',client:'c3',platform:'ig',caption:'Sunday brunch special — Spice Route',date:f(0),time:'09:00',status:'scheduled'},{id:'p3',client:'c4',platform:'fb',caption:'Transform your body in 90 days',date:f(3),time:'08:00',status:'scheduled'},{id:'p4',client:'c2',platform:'li',caption:'How AI is reshaping enterprise workflows',date:f(4),time:'09:30',status:'draft'}];
  D.invoices=[{id:'i1',client:'c1',number:'INV-001',amount:25000,date:b(10),due:f(20),status:'paid',items:[{desc:'Social Media - May',qty:1,rate:25000}]},{id:'i2',client:'c2',number:'INV-002',amount:35000,date:b(5),due:f(25),status:'pending',items:[{desc:'LinkedIn Strategy',qty:1,rate:35000}]},{id:'i3',client:'c3',number:'INV-003',amount:18000,date:b(30),due:b(5),status:'overdue',items:[{desc:'Instagram Mgmt - April',qty:1,rate:18000}]},{id:'i4',client:'c4',number:'INV-004',amount:42000,date:b(2),due:f(28),status:'pending',items:[{desc:'Full Social Package',qty:1,rate:42000}]}];
  D.reports=[{id:'r1',client:'c1',month:'April 2025',reach:45200,impressions:128000,engagement:'4.2%',posts:12,followers:'+320',notes:'Strong Reels performance.'}];
  save();
}

/* ===== LOGIN ===== */
function initLogin(){
  var ul=document.getElementById('ulist');
  ul.innerHTML='';
  var active=D.users.filter(function(u){return u.active;});
  for(var i=0;i<active.length;i++){
    (function(u){
      var b=document.createElement('button');
      b.className='ubtn';
      b.type='button';
      b.innerHTML='<div class="uav" style="background:'+u.color+'25;color:'+u.color+'">'+u.name.charAt(0)+'</div><div><div class="uname">'+u.name+'</div><div class="urole">'+cap(u.role)+'</div></div>';
      b.addEventListener('click',function(){selectU(u.id);});
      ul.appendChild(b);
    })(active[i]);
  }
}

function selectU(id){
  SU=id;
  var u=D.users.find(function(x){return x.id===id;});
  PB='';
  updDots();
  document.getElementById('pgreet').textContent='Hi '+u.name+'! Enter your PIN';
  document.getElementById('perr').textContent='';
  document.getElementById('sp-users').style.display='none';
  document.getElementById('sp-pin').style.display='block';
  buildPad();
}

function buildPad(){
  var pp=document.getElementById('ppad');
  pp.innerHTML='';
  var keys=['1','2','3','4','5','6','7','8','9','','0','⌫'];
  for(var i=0;i<keys.length;i++){
    (function(k){
      if(k===''){
        var sp=document.createElement('div');
        pp.appendChild(sp);
        return;
      }
      var b=document.createElement('button');
      b.type='button';
      b.className='pkey';
      b.textContent=k;
      if(k==='⌫')b.style.fontSize='14px';
      b.addEventListener('click',function(){
        if(k==='⌫'){PB=PB.slice(0,-1);updDots();}
        else if(PB.length<4){PB+=k;updDots();if(PB.length===4)setTimeout(checkPin,130);}
      });
      pp.appendChild(b);
    })(keys[i]);
  }
}

  pickedColor=u.color||'#6c63ff';
  var isMe=u.id===CU.id;
  openModal('<div class="mt">Edit: '+u.name+'</div><div class="fgrid"><div class="fg"><label class="fl">Full Name</label><input class="fi" id="un" value="'+u.name+'"></div><div class="fg"><label class="fl">Username</label><input class="fi" id="uu" value="'+u.username+'"></div><div class="fg"><label class="fl">New PIN (blank = keep)</label><input class="fi" id="upin" type="password" maxlength="4" placeholder="••••"></div><div class="fg"><label class="fl">Role</label><select class="fi" id="ur" '+(isMe?'disabled':'')+'>'+['admin','manager','staff','viewer'].map(function(r){return'<option value="'+r+'"'+(u.role===r?' selected':'')+'>'+cap(r)+'</option>';}).join('')+'</select></div><div class="fg"><label class="fl">Status</label><select class="fi" id="ua" '+(isMe?'disabled':'')+'><option value="1"'+(u.active?' selected':'')+'>Active</option><option value="0"'+(!u.active?' selected':'')+'>Inactive</option></select></div><div class="fg fgf"><label class="fl">Avatar Color</label>'+buildCP(u.color||'#6c63ff')+'</div></div><div class="fa"><button class="btn bg" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="saveEditUser(\''+id+'\')">Save</button></div>');
}
function saveEditUser(id){var u=D.users.find(function(x){return x.id===id;});var pv=document.getElementById('upin').value;if(pv&&!/^\d{4}$/.test(pv)){alert('PIN must be 4 digits');return;}u.name=document.getElementById('un').value;u.username=document.getElementById('uu').value;u.color=document.getElementById('uc').value||pickedColor;if(u.id!==CU.id){u.role=document.getElementById('ur').value;u.active=document.getElementById('ua').value==='1';}if(pv)u.pin=pv;if(u.id===CU.id){CU.name=u.name;CU.color=u.color;if(pv)CU.pin=pv;setupSide();}save();closeModal();goto('users');}
function delUser(id){if(!confirm('Delete user?'))return;D.users=D.users.filter(function(u){return u.id!==id;});save();goto('users');}

/* ===== INIT ===== */
load();seed();initLogin();
</script>
</body>
</html>
